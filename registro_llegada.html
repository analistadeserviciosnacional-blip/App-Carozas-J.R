<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Finalizar Servicio</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #0f0f1b; --gold: #d4af37; --slate: #1c1c2e; --w: #ffffff; --green: #2ecc71; }
        body { background: var(--ink); color: var(--w); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .card { background: var(--slate); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        h1 { color: var(--green); font-size: 22px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; outline: none; font-size: 16px;
        }
        .btn-finish { 
            width: 100%; padding: 15px; background: var(--green); color: white; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Finalizar Servicio</h1>
        <div class="form-group">
            <label>Seleccionar Vehículo en Ruta</label>
            <select id="carroza_id"><option>Buscando vehículos en ruta...</option></select>
        </div>
        <div class="form-group">
            <label>Kilometraje de Llegada</label>
            <input type="number" id="km_final" placeholder="KM al apagar el motor">
        </div>
        <div class="form-group">
            <label>Observaciones (Opcional)</label>
            <input type="text" id="obs" placeholder="Ej: Vehículo entregado limpio">
        </div>
        <button class="btn-finish" id="btn-save" onclick="finalizarServicio()">CERRAR TRASLADO</button>
    </div>
    <a href="dashboard.html" style="display:block; text-align:center; margin-top:20px; color:var(--gold); text-decoration:none;">← Volver</a>
</div>

<script src="db.js"></script>
<script>
    window.onload = async () => {
        const res = await DB.leer('carrozas');
        const select = document.getElementById('carroza_id');
        if(res.ok) {
            // Solo mostramos las que están "en ruta"
            const ocupadas = res.datos.filter(c => c.estado.toLowerCase() === 'en ruta');
            if(ocupadas.length === 0) {
                select.innerHTML = '<option value="">No hay vehículos en ruta</option>';
            } else {
                select.innerHTML = ocupadas.map(c => `<option value="${c.id}">${c.codigo} - ${c.placa}</option>`).join('');
            }
        }
    };

    async function finalizarServicio() {
        const btn = document.getElementById('btn-save');
        const idCarroza = document.getElementById('carroza_id').value;
        const kmFinal = document.getElementById('km_final').value;

        if(!idCarroza || !kmFinal) return alert("Faltan datos por completar");

        btn.disabled = true; btn.innerText = "Finalizando...";
        
        // Actualizamos la carroza: pasa a disponible y actualiza su KM total
        await DB.actualizar('carrozas', idCarroza, { 
            estado: 'disponible', 
            km: kmFinal,
            obs: document.getElementById('obs').value 
        });
        
        alert("Servicio finalizado. Vehículo liberado.");
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
