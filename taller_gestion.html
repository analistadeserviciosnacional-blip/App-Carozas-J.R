<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Gestión de Taller</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #0f0f1b; --gold: #d4af37; --slate: #1c1c2e; --w: #ffffff; --red: #ff4d4d; }
        body { background: var(--ink); color: var(--w); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .averia-card { 
            background: var(--slate); padding: 20px; border-radius: 15px; margin-bottom: 15px; 
            border-left: 5px solid var(--red); display: flex; justify-content: space-between; align-items: center;
        }
        .info h4 { margin: 0; color: var(--gold); font-size: 18px; }
        .info p { margin: 5px 0; font-size: 14px; opacity: 0.8; }
        .badge-prioridad { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; background: rgba(255,77,77,0.2); color: var(--red); text-transform: uppercase; }

        .btn-fix { 
            background: #2ecc71; color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-fix:hover { background: #27ae60; transform: scale(1.05); }
        
        .empty-state { text-align: center; padding: 50px; opacity: 0.5; }
        .back { color: var(--gold); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔧 Control de Taller</h1>
        <a href="dashboard.html" class="back">← Volver</a>
    </div>

    <div id="lista-averias">
        <p style="text-align: center;">Buscando reportes pendientes...</p>
    </div>
</div>

<script src="db.js"></script>
<script>
    async function cargarAverias() {
        const container = document.getElementById('lista-averias');
        const res = await DB.leer('averias');
        
        if (!res.ok || res.datos.length === 0) {
            container.innerHTML = '<div class="empty-state"><h3>✅ Todo en orden</h3><p>No hay reportes de averías pendientes.</p></div>';
            return;
        }

        // Filtramos solo las que están "Pendientes"
        const pendientes = res.datos.filter(a => a.estado.toLowerCase() === 'pendiente');

        if (pendientes.length === 0) {
            container.innerHTML = '<div class="empty-state"><h3>✅ Sin fallas activas</h3><p>Todos los vehículos están operativos.</p></div>';
            return;
        }

        container.innerHTML = pendientes.map(a => `
            <div class="averia-card">
                <div class="info">
                    <span class="badge-prioridad">Prioridad: ${a.prioridad}</span>
                    <h4>${a.carroza_id} - ${a.tipo}</h4>
                    <p><strong>Falla:</strong> ${a.descripcion}</p>
                    <p><small>Reportado por ${a.conductor} el ${a.fecha}</small></p>
                </div>
                <button class="btn-fix" onclick="reparar('${a.id}', '${a.carroza_id}')">MARCAR REPARADO</button>
            </div>
        `).join('');
    }

    async function reparar(idReporte, idCarroza) {
        if (!confirm("¿Confirmas que el vehículo ya está listo para trabajar?")) return;

        // 1. Cambiamos el estado del reporte a "Reparado"
        await DB.actualizar('averias', idReporte, { estado: 'Reparado' });

        // 2. Liberamos la carroza (vuelve a estar disponible)
        await DB.actualizar('carrozas', idCarroza, { estado: 'disponible', obs: 'Salida de taller exitosa' });

        alert("Vehículo dado de alta exitosamente.");
        cargarAverias(); // Recargar la lista
    }

    cargarAverias();
</script>

</body>
</html>
