<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Registro de Salida</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #0f0f1b; --gold: #d4af37; --slate: #1c1c2e; --w: #ffffff; }
        body { background: var(--ink); color: var(--w); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .card { background: var(--slate); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        h1 { color: var(--gold); font-size: 22px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; outline: none; font-size: 16px;
        }
        .btn-send { 
            width: 100%; padding: 15px; background: var(--gold); color: var(--ink); 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
        .info-nota { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Nueva Salida</h1>
        
        <div class="form-group">
            <label>Vehículo</label>
            <select id="carroza_id"><option>Cargando...</option></select>
        </div>

        <div class="form-group">
            <label>Nombre del Fallecido</label>
            <input type="text" id="fallecido" placeholder="Nombre completo">
        </div>

        <div class="form-group">
            <label>Origen</label>
            <input type="text" id="origen" placeholder="Lugar de recogida">
        </div>

        <div class="form-group">
            <label>Destino</label>
            <input type="text" id="destino" placeholder="Lugar de destino">
        </div>

        <div class="form-group">
            <label>KM Inicial</label>
            <input type="number" id="km_inicio" placeholder="Kilometraje actual">
        </div>

        <div class="form-group">
            <label>Link de Fotos/Video (Evidencia)</label>
            <input type="url" id="evidencia" placeholder="Enlace de Drive o iCloud">
        </div>

        <button class="btn-send" id="btn-save" onclick="registrarSalida()">REGISTRAR Y ENVIAR WA</button>
        <p class="info-nota">Se enviará el reporte automático a WhatsApp.</p>
    </div>
</div>

<script src="db.js"></script>
<script>
    const user = JSON.parse(sessionStorage.getItem('jr_user'));
    
    window.onload = async () => {
        const res = await DB.leer('carrozas');
        if(res.ok) {
            const libres = res.datos.filter(c => c.estado.toLowerCase() === 'disponible');
            document.getElementById('carroza_id').innerHTML = libres.map(c => 
                `<option value="${c.id}">${c.codigo} - ${c.placa}</option>`).join('');
        }
    };

    async function registrarSalida() {
        const btn = document.getElementById('btn-save');
        const campos = {
            id: 'T-' + Date.now(),
            carroza_id: document.getElementById('carroza_id').value,
            fallecido: document.getElementById('fallecido').value.trim(),
            conductor: user.nombre,
            origen: document.getElementById('origen').value.trim(),
            destino: document.getElementById('destino').value.trim(),
            km_entrada: document.getElementById('km_inicio').value,
            evidencia: document.getElementById('evidencia').value,
            fecha: new Date().toLocaleString(),
            estado: 'en ruta'
        };

        if(!campos.fallecido || !campos.origen || !campos.km_entrada) return alert("Por favor complete los campos obligatorios.");

        btn.disabled = true; btn.innerText = "Guardando...";

        await DB.guardar('traslados', campos);
        await DB.actualizar('carrozas', campos.carroza_id, { estado: 'en ruta', km: campos.km_entrada });

        // GENERAR MENSAJE PARA WHATSAPP
        const msg = `*REPORTE DE SALIDA J.R.*\n\n` +
                    `⚱️ *Fallecido:* ${campos.fallecido}\n` +
                    `🚚 *Vehículo:* ${campos.carroza_id}\n` +
                    `👤 *Conductor:* ${campos.conductor}\n` +
                    `📍 *Origen:* ${campos.origen}\n` +
                    `🏁 *Destino:* ${campos.destino}\n` +
                    `🛣️ *KM Salida:* ${campos.km_entrada}\n` +
                    `🔗 *Evidencia:* ${campos.evidencia || 'No adjunta'}`;

        const tel = "573000000000"; // PON AQUÍ TU NÚMERO DE WHATSAPP
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');

        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
